<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFCD00">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
<title>CorreosTest 2026 — Aprueba Correos en 5 minutos al día</title>
<meta name="description" content="La forma más fácil de preparar la oposición a Correos. Pregunta del día, microtests de 5 minutos, temario con audio y simulacros cronometrados. Gratis, sin registro, funciona sin conexión.">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  :root { --brand-primary: #003366; --brand-accent: #FFCD00; }
  .app-header { background: #003366 !important; color: #FFCD00 !important; }
  .app-header .brand-logo { background: #FFCD00 !important; color: #003366 !important; }
  .app-header .brand { color: #FFCD00 !important; }
  .app-header .nav-item { color: #fff !important; }
  .app-header .nav-item.active { color: #FFCD00 !important; }
  .btn-primary { background: #003366 !important; color: #FFCD00 !important; }
  .btn-primary:hover { background: #002344 !important; }

  /* Selector de puesto */
  .puesto-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .puesto-row { display: flex; gap: 12px; align-items: center; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .puesto-row:hover { border-color: #003366; }
  .puesto-row.puesto-selected { border-color: #003366; background: #f0f4f8; }
  .puesto-row input[type="radio"] { width: 18px; height: 18px; accent-color: #003366; }
  .puesto-info { flex: 1; }
  .puesto-nombre { font-weight: 600; color: #0f172a; }

  /* Banner del puesto en Home */
  .puesto-banner { background: linear-gradient(135deg, #003366 0%, #004488 100%); color: #fff; padding: 12px 18px; border-radius: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .puesto-banner .puesto-banner-name { font-weight: 600; }
  .puesto-banner .puesto-banner-name span { color: #FFCD00; }
  .puesto-banner .puesto-banner-link { color: #FFCD00; text-decoration: underline; background: none; border: 0; cursor: pointer; font-family: inherit; font-size: 14px; }

  /* Pantalla de temario */
  .temario-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tema-btn { padding: 8px 14px; border: 2px solid #e5e7eb; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.15s; }
  .tema-btn:hover { border-color: #003366; color: #003366; }
  .tema-btn.active { background: #003366; color: #FFCD00; border-color: #003366; }
  .tema-content { background: #fff; border-radius: 12px; padding: 28px; border: 1px solid #e5e7eb; line-height: 1.7; font-size: 15px; }
  .tema-content h2 { font-size: 18px; color: #003366; margin: 0 0 16px; line-height: 1.3; }
  .tema-content h3 { font-size: 16px; margin: 20px 0 8px; color: #0f172a; }
  .tema-content h4 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: #334155; }
  .tema-content ul, .tema-content ol { padding-left: 20px; margin: 8px 0; }
  .tema-content li { margin-bottom: 4px; }
  .tema-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  .tema-content th { background: #003366; color: #fff; padding: 8px 10px; text-align: left; }
  .tema-content td { padding: 7px 10px; border-bottom: 1px solid #e5e7eb; }
  .tema-content tr:nth-child(even) td { background: #f8fafc; }
  .tema-content em { display: block; background: #FFCD00; padding: 12px 16px; border-radius: 8px; font-style: normal; font-size: 13px; margin-top: 20px; color: #003366; font-weight: 500; }
  .legislacion-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; padding: 3px 8px; margin: 2px; color: #475569; }

  /* Cabecera con botón alineado a la derecha */
  .page-head-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }

  /* Tarjeta "¿Qué estudiar hoy?" */
  .foco-list { display: flex; flex-direction: column; gap: 8px; }
  .foco-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f8fafc; border-radius: 8px; }
  .foco-rank { width: 24px; height: 24px; border-radius: 50%; background: #003366; color: #FFCD00; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .foco-info { flex: 1; min-width: 0; }
  .foco-name { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .foco-stats { font-size: 11px; color: #64748b; margin-top: 2px; }
  .btn-foco { font-size: 11px; font-weight: 600; color: #003366; background: #fff; border: 1px solid #003366; border-radius: 6px; padding: 4px 8px; cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
  .btn-foco:hover { background: #003366; color: #FFCD00; }
  .badge-info { background: #dbeafe; color: #1e40af; }

  /* Fallos con enlace a temario */
  .wrong-list { display: flex; flex-direction: column; }
  .wrong-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
  .wrong-item:last-child { border-bottom: 0; }
  .wrong-q { font-size: 14px; color: #0f172a; line-height: 1.5; margin-bottom: 6px; }
  .wrong-correct { font-size: 13px; color: #16a34a; font-weight: 500; margin-bottom: 8px; }
  .btn-tema-link { display: inline-block; font-size: 12px; font-weight: 600; color: #003366; background: #f0f4f8; border: 1px solid #003366; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-tema-link:hover { background: #003366; color: #FFCD00; }

  /* Modal de activación de plan */
  .upgrade-modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 520px; width: 90%; margin: auto; }
  .upgrade-modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .upgrade-modal-head h3 { font-size: 18px; color: #003366; margin: 0; }
  .upgrade-steps { display: flex; flex-direction: column; gap: 20px; }
  .upgrade-step { display: flex; gap: 14px; align-items: flex-start; padding: 16px; background: #f8fafc; border-radius: 10px; border: 1px solid #e5e7eb; }
  .upgrade-step-num { width: 28px; height: 28px; border-radius: 50%; background: #003366; color: #FFCD00; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .upgrade-step-title { font-weight: 600; color: #0f172a; margin-bottom: 4px; }
  .tribunal-overlay.upgrade-flow { display: flex; align-items: center; justify-content: center; }

  /* Reproductor de audio en temario */
  .audio-bar { display:flex; align-items:center; gap:12px; background:#003366; color:#fff; padding:10px 16px; border-radius:10px; margin-bottom:16px; }
  .audio-bar .ap-name { flex:1; font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ap-controls { display:flex; gap:8px; }
  .ap-btn { background:rgba(255,255,255,0.15); border:0; color:#fff; border-radius:6px; width:34px; height:34px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .ap-btn:hover { background:rgba(255,255,255,0.25); }

  /* Impresión de ficha de temario */
  @media print {
    .no-print, .app-header, nav, .temario-nav { display: none !important; }
    .screen { display: block !important; }
    .screen:not(#screen-temario) { display: none !important; }
    body { background: white; font-size: 12px; }
    .container { max-width: 100%; padding: 0; }
    .tema-content { border: none; padding: 0; box-shadow: none; font-size: 12px; line-height: 1.5; }
    .tema-content h2 { font-size: 15px; border-bottom: 2px solid #003366; padding-bottom: 6px; margin-bottom: 12px; }
    .tema-content h3 { font-size: 13px; margin: 14px 0 6px; }
    .tema-content h4 { font-size: 12px; margin: 10px 0 4px; }
    .tema-content em { background: #fffde7; border: 1px solid #fbc02d; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tema-content table { font-size: 11px; }
    .tema-content th { background: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── CARTITO SVG ────────────────────────────────────────────── */
  @keyframes cartito-bob  {0%,100%{transform:translateY(0)}   50%{transform:translateY(-7px)}}
  @keyframes cartito-jump {0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-20px) rotate(-7deg)} 65%{transform:translateY(-10px) rotate(5deg)}}
  @keyframes cartito-shake{0%,100%{transform:rotate(0)}  20%{transform:rotate(-9deg)}  60%{transform:rotate(9deg)}}
  @keyframes arm-wave-svg {0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-55deg)}}
  @keyframes bubble-pop   {0%{transform:scale(.55) translateY(10px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1}}
  @keyframes lid-blink    {0%,85%,100%{transform:scaleY(0)} 92%{transform:scaleY(1)}}

  #cartito{position:fixed;bottom:72px;right:12px;z-index:300;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;user-select:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}
  @media(min-width:641px){#cartito{bottom:16px}}

  .cartito-bubble{background:#fff;border:2.5px solid #003366;border-radius:14px;padding:9px 14px;max-width:182px;font-size:13px;font-weight:600;color:#0f172a;text-align:center;line-height:1.4;position:relative;box-shadow:0 6px 18px rgba(0,0,0,.16);animation:bubble-pop .38s cubic-bezier(.34,1.56,.64,1)}
  .cartito-bubble::after {content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top:10px solid #003366}
  .cartito-bubble::before{content:'';position:absolute;bottom:-8px; left:50%;transform:translateX(-50%);border:5px solid transparent;border-top:9px solid #fff;z-index:1}

  .cartito-char{width:88px;display:block;animation:cartito-bob 2.5s ease-in-out infinite}
  .cartito-char.jump {animation:cartito-jump  .6s  ease-in-out 2 !important}
  .cartito-char.shake{animation:cartito-shake .45s ease-in-out 3 !important}

  /* Parpadeo — eyelids sobre los ojos */
  #ct-lid-l{transform-origin:38px 52px; animation:lid-blink 5s ease-in-out infinite;       transform:scaleY(0)}
  #ct-lid-r{transform-origin:62px 52px; animation:lid-blink 5s ease-in-out infinite .07s;  transform:scaleY(0)}

  /* Brazo derecho saluda cuando el char tiene .jump */
  #ct-arm-r{transform-origin:74px 82px;transition:transform .2s}
  .cartito-char.jump  #ct-arm-r{animation:arm-wave-svg .28s ease-in-out 6 forwards}

  /* Boca triste cuando .shake */
  #ct-mouth-happy{transition:opacity .25s} #ct-mouth-sad{transition:opacity .25s;opacity:0}
  .cartito-char.shake #ct-mouth-happy{opacity:0}
  .cartito-char.shake #ct-mouth-sad  {opacity:1}
  /* ── fin Cartito ─────────────────────────────────────────────── */
</style>
</head>

<!-- Cartito — mascota cartero SVG -->
<div id="cartito" onclick="IIAPP.Mascot && IIAPP.Mascot.tap()" title="¡Toca a Cartito!">
  <div class="cartito-bubble" id="cartito-bubble" style="display:none">
    <p id="cartito-text">¡Hola! 👋</p>
  </div>
  <svg id="cartito-char" class="cartito-char" viewBox="0 0 100 148" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="g-skin" cx="38%" cy="30%" r="65%">
        <stop offset="0%" stop-color="#fde3bb"/>
        <stop offset="100%" stop-color="#e8a87c"/>
      </radialGradient>
      <radialGradient id="g-cheek" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f0907a" stop-opacity=".65"/>
        <stop offset="100%" stop-color="#f0907a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="g-jacket" cx="40%" cy="20%" r="70%">
        <stop offset="0%" stop-color="#1a4f8a"/>
        <stop offset="100%" stop-color="#001f4d"/>
      </radialGradient>
      <radialGradient id="g-hat" cx="40%" cy="30%" r="65%">
        <stop offset="0%" stop-color="#1a4f8a"/>
        <stop offset="100%" stop-color="#001533"/>
      </radialGradient>
    </defs>

    <!-- Sombra suelo -->
    <ellipse cx="50" cy="145" rx="21" ry="4" fill="rgba(0,0,0,.14)"/>

    <!-- PIERNAS -->
    <rect x="32" y="110" width="14" height="26" rx="7" fill="#1a3560"/>
    <rect x="54" y="110" width="14" height="26" rx="7" fill="#1a3560"/>

    <!-- ZAPATOS -->
    <ellipse cx="39" cy="136" rx="11" ry="6" fill="#111827"/>
    <ellipse cx="61" cy="136" rx="11" ry="6" fill="#111827"/>
    <ellipse cx="37" cy="134" rx="4.5" ry="1.8" fill="rgba(255,255,255,.18)"/>
    <ellipse cx="59" cy="134" rx="4.5" ry="1.8" fill="rgba(255,255,255,.18)"/>

    <!-- BRAZO IZQUIERDO -->
    <g transform="rotate(12,20,82)">
      <rect x="11" y="80" width="16" height="30" rx="8" fill="url(#g-jacket)"/>
      <!-- mano -->
      <circle cx="19" cy="111" r="7.5" fill="url(#g-skin)"/>
      <ellipse cx="13.5" cy="108" rx="4.5" ry="3.5" fill="#fde3bb" transform="rotate(-25,13.5,108)"/>
    </g>

    <!-- BRAZO DERECHO (saluda) -->
    <g id="ct-arm-r">
      <g transform="rotate(-12,80,82)">
        <rect x="73" y="80" width="16" height="30" rx="8" fill="url(#g-jacket)"/>
        <circle cx="81" cy="111" r="7.5" fill="url(#g-skin)"/>
        <ellipse cx="86.5" cy="108" rx="4.5" ry="3.5" fill="#fde3bb" transform="rotate(25,86.5,108)"/>
      </g>
    </g>

    <!-- CUERPO / CHAQUETA -->
    <rect x="26" y="78" width="48" height="38" rx="13" fill="url(#g-jacket)"/>
    <!-- camisa -->
    <rect x="43" y="79" width="14" height="37" rx="5" fill="#f0f4ff"/>
    <!-- corbata -->
    <polygon points="50,81 46,93 50,104 54,93" fill="#FFCD00"/>
    <polygon points="47,103 50,108 53,103" fill="#e6b800"/>
    <!-- solapas chaqueta -->
    <path d="M43,79 C38,84 36,94 38,102" stroke="rgba(255,255,255,.12)" stroke-width="1.2" fill="none"/>
    <path d="M57,79 C62,84 64,94 62,102" stroke="rgba(255,255,255,.12)" stroke-width="1.2" fill="none"/>
    <!-- botones -->
    <circle cx="50" cy="90" r="2.2" fill="#FFCD00"/>
    <circle cx="50" cy="98" r="2.2" fill="#FFCD00"/>

    <!-- BOLSA DE CORREOS -->
    <g transform="translate(72,88)">
      <!-- correa -->
      <path d="M2,-2 Q-3,-10 0,-16" stroke="#cc9900" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- cuerpo -->

      <path d="M0,11 Q12,7 24,11 L24,0 Q12,-3 0,0 Z" fill="#e6b800"/>
      <!-- cierre -->

    <!-- CUELLO -->

    <!-- franja lateral -->

    <!-- CEJAS -->

    <path d="M57,37 Q62,34 67,37" stroke="#7a4f28" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- OJO IZQUIERDO -->

    <circle  cx="38" cy="49" r="5.5" fill="#2a1a0e"/>

    <circle  cx="39.8" cy="47" r="2" fill="white"/>
    <ellipse cx="38" cy="48" rx="7.5" ry="7.5" id="ct-lid-l" fill="url(#g-skin)" style="transform:scaleY(0)"/>

    <!-- OJO DERECHO -->
    <ellipse cx="62" cy="48" rx="7" ry="7.5" fill="white"/>
    <circle  cx="62" cy="49" r="5.5" fill="#2a1a0e"/>
