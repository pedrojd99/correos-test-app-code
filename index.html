<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFCD00">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
<title>CorreosTest 2026 — Aprueba Correos en 5 minutos al día</title>
<meta name="description" content="La forma más fácil de preparar la oposición a Correos. Pregunta del día, microtests de 5 minutos, temario con audio y simulacros cronometrados. Gratis, sin registro, funciona sin conexión.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root { --brand-primary: #003366; --brand-accent: #FFCD00; }
  .app-header { background: #003366 !important; color: #FFCD00 !important; }
  .app-header .brand-logo { background: #FFCD00 !important; color: #003366 !important; }
  .app-header .brand { color: #FFCD00 !important; }
  .app-header .nav-item { color: #fff !important; }
  .app-header .nav-item.active { color: #FFCD00 !important; }
  .btn-primary { background: #003366 !important; color: #FFCD00 !important; }
  .btn-primary:hover { background: #002344 !important; }

  /* Selector de puesto */
  .puesto-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .puesto-row { display: flex; gap: 12px; align-items: center; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .puesto-row:hover { border-color: #003366; }
  .puesto-row.puesto-selected { border-color: #003366; background: #f0f4f8; }
  .puesto-row input[type="radio"] { width: 18px; height: 18px; accent-color: #003366; }
  .puesto-info { flex: 1; }
  .puesto-nombre { font-weight: 600; color: #0f172a; }

  /* Banner del puesto en Home */
  .puesto-banner { background: linear-gradient(135deg, #003366 0%, #004488 100%); color: #fff; padding: 12px 18px; border-radius: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .puesto-banner .puesto-banner-name { font-weight: 600; }
  .puesto-banner .puesto-banner-name span { color: #FFCD00; }
  .puesto-banner .puesto-banner-link { color: #FFCD00; text-decoration: underline; background: none; border: 0; cursor: pointer; font-family: inherit; font-size: 14px; }

  /* Pantalla de temario */
  .temario-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tema-btn { padding: 8px 14px; border: 2px solid #e5e7eb; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.15s; }
  .tema-btn:hover { border-color: #003366; color: #003366; }
  .tema-btn.active { background: #003366; color: #FFCD00; border-color: #003366; }
  .tema-content { background: #fff; border-radius: 14px; padding: 36px 40px; border: 1px solid #e5e7eb; line-height: 1.75; font-size: 15px; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
  .tema-content h2 { font-size: 19px; color: #003366; margin: 0 0 20px; line-height: 1.3; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
  .tema-content h3 { font-size: 16px; font-weight: 700; margin: 28px 0 10px; color: #003366; border-left: 4px solid #003366; padding-left: 10px; }
  .tema-content h4 { font-size: 14px; font-weight: 700; margin: 18px 0 8px; color: #334155; }
  .tema-content ul, .tema-content ol { padding-left: 22px; margin: 10px 0 14px; }
  .tema-content li { margin-bottom: 6px; line-height: 1.65; }
  .tema-content p { margin: 0 0 12px; }
  .tema-content table { width: 100%; border-collapse: collapse; margin: 14px 0 18px; font-size: 14px; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
  .tema-content th { background: #003366; color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
  .tema-content td { padding: 9px 12px; border-bottom: 1px solid #e5e7eb; }
  .tema-content tr:nth-child(even) td { background: #f8fafc; }
  .tema-content em { display: block; background: #FFF9C4; border-left: 4px solid #FFCD00; padding: 14px 18px; border-radius: 0 8px 8px 0; font-style: normal; font-size: 13.5px; margin: 24px 0 8px; color: #1e293b; font-weight: 500; line-height: 1.65; }
  @media (max-width: 640px) {
    .tema-content { padding: 20px 18px; }
    .tema-content h3 { font-size: 15px; }
  }
  .legislacion-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; padding: 3px 8px; margin: 2px; color: #475569; }

  /* Cabecera con botón alineado a la derecha */
  .page-head-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }

  /* Tarjeta "¿Qué estudiar hoy?" */
  .foco-list { display: flex; flex-direction: column; gap: 8px; }
  .foco-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f8fafc; border-radius: 8px; }
  .foco-rank { width: 24px; height: 24px; border-radius: 50%; background: #003366; color: #FFCD00; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .foco-info { flex: 1; min-width: 0; }
  .foco-name { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .foco-stats { font-size: 11px; color: #64748b; margin-top: 2px; }
  .btn-foco { font-size: 11px; font-weight: 600; color: #003366; background: #fff; border: 1px solid #003366; border-radius: 6px; padding: 4px 8px; cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
  .btn-foco:hover { background: #003366; color: #FFCD00; }
  .badge-info { background: #dbeafe; color: #1e40af; }

  /* Fallos con enlace a temario */
  .wrong-list { display: flex; flex-direction: column; }
  .wrong-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
  .wrong-item:last-child { border-bottom: 0; }
  .wrong-q { font-size: 14px; color: #0f172a; line-height: 1.5; margin-bottom: 6px; }
  .wrong-correct { font-size: 13px; color: #16a34a; font-weight: 500; margin-bottom: 8px; }
  .btn-tema-link { display: inline-block; font-size: 12px; font-weight: 600; color: #003366; background: #f0f4f8; border: 1px solid #003366; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-tema-link:hover { background: #003366; color: #FFCD00; }

  /* Modal de activación de plan */
  .upgrade-modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 520px; width: 90%; margin: auto; }
  .upgrade-modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .upgrade-modal-head h3 { font-size: 18px; color: #003366; margin: 0; }
  .upgrade-steps { display: flex; flex-direction: column; gap: 20px; }
  .upgrade-step { display: flex; gap: 14px; align-items: flex-start; padding: 16px; background: #f8fafc; border-radius: 10px; border: 1px solid #e5e7eb; }
  .upgrade-step-num { width: 28px; height: 28px; border-radius: 50%; background: #003366; color: #FFCD00; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .upgrade-step-title { font-weight: 600; color: #0f172a; margin-bottom: 4px; }
  .tribunal-overlay.upgrade-flow { display: flex; align-items: center; justify-content: center; }

  /* Reproductor de audio en temario */
  .audio-bar { display:flex; align-items:center; gap:12px; background:#003366; color:#fff; padding:10px 16px; border-radius:10px; margin-bottom:16px; }
  .audio-bar .ap-name { flex:1; font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ap-controls { display:flex; gap:8px; }
  .ap-btn { background:rgba(255,255,255,0.15); border:0; color:#fff; border-radius:6px; width:34px; height:34px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .ap-btn:hover { background:rgba(255,255,255,0.25); }

  /* Impresión de ficha de temario (botón "Imprimir tema") */
  @media print {
    @page { size: A4; margin: 22mm 18mm 20mm 20mm; }
    .no-print, .app-header, nav, .temario-nav, #cartito { display: none !important; }
    .screen { display: block !important; }
    .screen:not(#screen-temario) { display: none !important; }
    body { background: white; font-size: 11px; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .container { max-width: 100%; padding: 0; }
    /* Cabecera fija al imprimir tema individual */
    .page-head-row::after {
      content: 'CorreosTest 2026  ·  Preparación Oposición Correos · Grupo IV';
      display: block; font-size: 7pt; color: #94a3b8;
      border-top: 0.5pt solid #e2e8f0; margin-top: 8pt; padding-top: 4pt;
    }
    .tema-content { border: none; padding: 0; box-shadow: none; font-size: 10.5pt; line-height: 1.6; }
    .tema-content h2 { font-size: 14pt; color: #003366; border-bottom: 1.5pt solid #003366; padding-bottom: 5px; margin-bottom: 10px; }
    .tema-content h3 { font-size: 12pt; color: #003366; margin: 14px 0 5px; }
    .tema-content h4 { font-size: 10.5pt; font-weight: 700; margin: 10px 0 4px; }
    .tema-content ul li { margin-bottom: 3pt; }
    .tema-content em { background: #FFF9C4 !important; border-left: 3pt solid #FFCD00; padding: 7pt 10pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tema-content table { font-size: 9pt; }
    .tema-content th { background: #003366 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tema-content tr:nth-child(even) td { background: #f8fafc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* Cartito → css/cartito.css */
</style>
</head>

<!--
  CARTITO — Integración Lottie (cuando tengas el archivo):
  1. Descarga un JSON de lottiefiles.com (perro/mascota de tu elección)
  2. Guárdalo como: audio/cartito-idle.json
  3. Añade estos scripts justo antes del cierre </body>:
     <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  4. Llama: IIAPP.Mascot.loadLottie('audio/cartito-idle.json')
  Los estados (jump, shake) se controlan con loadLottie('audio/cartito-happy.json') etc.
-->
<div id="cartito" onclick="IIAPP.Mascot && IIAPP.Mascot.tap()" title="¡Toca a Cartito!">
  <div class="cartito-bubble" id="cartito-bubble" style="display:none">
    <p id="cartito-text">¡Hola! 👋</p>
  </div>
  <!-- SVG Clay-style — outline grueso + gradientes volumétricos + filtros sombra -->
  <svg id="cartito-char" class="cartito-char" viewBox="0 0 120 170" xmlns="http://www.w3.org/2000/svg"
       overflow="hidden" role="img" aria-label="Cartito, el perro cartero">
    <defs>
      <!-- Gradientes clay — 3 paradas para efecto volumétrico -->
      <radialGradient id="g-fur" cx="35%" cy="25%" r="65%">
        <stop offset="0%"   stop-color="#ffd080"/>
        <stop offset="55%"  stop-color="#f09040"/>
        <stop offset="100%" stop-color="#b85c18"/>
      </radialGradient>
      <radialGradient id="g-fur-ear" cx="40%" cy="30%" r="70%">
        <stop offset="0%"   stop-color="#e07830"/>
        <stop offset="100%" stop-color="#8b3e0e"/>
      </radialGradient>
      <radialGradient id="g-muzzle" cx="45%" cy="35%" r="65%">
        <stop offset="0%"   stop-color="#fff2d8"/>
        <stop offset="70%"  stop-color="#f8d8a0"/>
        <stop offset="100%" stop-color="#e4b478"/>
      </radialGradient>
      <radialGradient id="g-jacket" cx="30%" cy="20%" r="75%">
        <stop offset="0%"   stop-color="#3a70c0"/>
        <stop offset="60%"  stop-color="#0040a0"/>
        <stop offset="100%" stop-color="#001860"/>
      </radialGradient>
      <radialGradient id="g-hat" cx="35%" cy="25%" r="70%">
        <stop offset="0%"   stop-color="#2a5aa0"/>
        <stop offset="100%" stop-color="#001040"/>
      </radialGradient>
      <radialGradient id="g-bag" cx="30%" cy="20%" r="70%">
        <stop offset="0%"   stop-color="#ffe040"/>
        <stop offset="60%"  stop-color="#FFCD00"/>
        <stop offset="100%" stop-color="#c89400"/>
      </radialGradient>
      <radialGradient id="g-eye-iris" cx="35%" cy="30%" r="60%">
        <stop offset="0%"   stop-color="#8b5a28"/>
        <stop offset="100%" stop-color="#3a1a08"/>
      </radialGradient>
      <radialGradient id="g-cheek" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#f07858" stop-opacity=".7"/>
        <stop offset="100%" stop-color="#f07858" stop-opacity="0"/>
      </radialGradient>
      <!-- Filtro sombra suave (clay look) -->
      <filter id="f-drop" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#4a2000" flood-opacity=".22"/>
      </filter>
      <filter id="f-drop-sm" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#4a2000" flood-opacity=".18"/>
      </filter>
    </defs>

    <!-- ═══ CONTORNO EXTERIOR global (clay outline) ═══ -->
    <!-- Sombra suelo -->
    <ellipse cx="60" cy="167" rx="28" ry="5" fill="rgba(0,0,0,.18)"/>

    <!-- ══ COLA ══ -->
    <g id="ct-tail" filter="url(#f-drop-sm)">
      <path d="M85,112 Q108,96 104,76 Q100,60 88,66 Q82,70 88,80 Q94,90 84,106 Z"
            fill="url(#g-fur-ear)" stroke="#2c1000" stroke-width="2" stroke-linejoin="round"/>
      <ellipse cx="100" cy="72" rx="7" ry="9" fill="#fff5e0" stroke="#e8c080" stroke-width="1.2"
               transform="rotate(-25,100,72)"/>
    </g>

    <!-- ══ PIERNAS ══ -->
    <rect x="36" y="128" width="18" height="28" rx="9" fill="#1a3070" stroke="#0a1840" stroke-width="2"/>
    <rect x="66" y="128" width="18" height="28" rx="9" fill="#1a3070" stroke="#0a1840" stroke-width="2"/>
    <!-- Patas / pies -->
    <ellipse cx="45" cy="157" rx="13" ry="8" fill="url(#g-fur-ear)" stroke="#2c1000" stroke-width="2"/>
    <ellipse cx="75" cy="157" rx="13" ry="8" fill="url(#g-fur-ear)" stroke="#2c1000" stroke-width="2"/>
    <!-- Dedos (3 cada pata) -->
    <circle cx="36" cy="159" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>
    <circle cx="44" cy="162" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>
    <circle cx="53" cy="160" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>
    <circle cx="66" cy="160" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>
    <circle cx="75" cy="162" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>
    <circle cx="84" cy="159" r="4.5" fill="#9a4c18" stroke="#2c1000" stroke-width="1.5"/>

    <!-- ══ BRAZO IZQUIERDO ══ -->
    <g transform="rotate(16,22,96)" filter="url(#f-drop-sm)">
      <rect x="12" y="92" width="20" height="34" rx="10" fill="url(#g-jacket)" stroke="#0a1840" stroke-width="2"/>
      <ellipse cx="22" cy="127" rx="12" ry="9" fill="url(#g-fur)" stroke="#2c1000" stroke-width="2"/>
      <circle cx="14" cy="129" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
      <circle cx="22" cy="132" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
      <circle cx="30" cy="129" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
    </g>

    <!-- ══ BRAZO DERECHO (saluda) ══ -->
    <g id="ct-arm-r" filter="url(#f-drop-sm)">
      <g transform="rotate(-16,98,96)">
        <rect x="88" y="92" width="20" height="34" rx="10" fill="url(#g-jacket)" stroke="#0a1840" stroke-width="2"/>
        <ellipse cx="98" cy="127" rx="12" ry="9" fill="url(#g-fur)" stroke="#2c1000" stroke-width="2"/>
        <circle cx="90" cy="129" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
        <circle cx="98" cy="132" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
        <circle cx="106" cy="129" r="3.8" fill="#c87030" stroke="#2c1000" stroke-width="1.2"/>
      </g>
    </g>

    <!-- ══ CUERPO / UNIFORME ══ -->
    <rect x="28" y="88" width="64" height="48" rx="18" fill="url(#g-jacket)" stroke="#0a1840" stroke-width="2.5" filter="url(#f-drop)"/>
    <!-- Camisa interior -->
    <rect x="50" y="89" width="20" height="47" rx="7" fill="#eef4ff" stroke="#c8d8f0" stroke-width="1"/>
    <!-- Corbata -->
    <polygon points="60,91 54.5,107 60,120 65.5,107" fill="url(#g-bag)" stroke="#aa8800" stroke-width="1.2"/>
    <polygon points="56.5,119 60,126 63.5,119" fill="#cc9a00"/>
    <!-- Botones -->
    <circle cx="60" cy="104" r="3" fill="#FFCD00" stroke="#aa8800" stroke-width="1"/>
    <circle cx="60" cy="114" r="3" fill="#FFCD00" stroke="#aa8800" stroke-width="1"/>

    <!-- ══ BOLSA POSTAL ══ -->
    <g transform="translate(85,96)" filter="url(#f-drop-sm)">
      <!-- correa -->
      <path d="M4,0 Q-5,-12 0,-22" stroke="#aa8000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- cuerpo bolsa -->
      <rect x="0" y="0" width="28" height="26" rx="8" fill="url(#g-bag)" stroke="#aa8000" stroke-width="2"/>
      <!-- solapa bolsa -->
      <path d="M0,13 Q14,8 28,13 L28,0 Q14,-5 0,0 Z" fill="#e6b800" stroke="#aa8000" stroke-width="1.5"/>
      <!-- cierre -->
      <circle cx="14" cy="6.5" r="4.5" fill="#cc8800" stroke="#aa6600" stroke-width="1.2"/>
      <circle cx="14" cy="6.5" r="2.5" fill="#886600"/>
      <!-- carta -->
      <rect x="4" y="15" width="20" height="12" rx="2.5" fill="white" stroke="#c0d0e0" stroke-width="1"/>
      <path d="M4,15 L14,22 L24,15" stroke="#94a8b8" stroke-width="1.5" fill="none"/>
